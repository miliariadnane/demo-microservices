server:
  port: 8007
  error:
    include-message: always

spring:
  application:
    name: ai-assistant
  config:
    import:
      - "classpath:shared-application-${spring.profiles.active}.yml"
      - "classpath:clients-${spring.profiles.active}.properties"
  threads:
    virtual:
      enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11435}
      chat:
        options:
          model: ${AI_MODEL:qwen2.5:3b}
          temperature: 0.7
      init:
        pull-model-strategy: never
  # AI assistant doesn't need its own database
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

logging:
  level:
    dev.nano.ai: DEBUG
    org.springframework.ai: DEBUG
